<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills Validation</title>
  <link rel="stylesheet" href="styles/output.css" />
</head>
<body>
  <div style="display:flex; height:100vh;">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">SKILLS VALIDATION</div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-page="validate">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          Validate
        </button>
        <button class="nav-item" data-page="matcher">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          Matcher
        </button>
        <button class="nav-item" data-page="coverage">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
          Coverage
        </button>
        <button class="nav-item" data-page="llm">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          LLM Dry-Run
        </button>
      </nav>
      <div class="sidebar-footer">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
          <div class="dir-display" id="current-dir" style="flex:1;margin-bottom:0;">No directory loaded</div>
          <span id="watch-indicator" style="display:none;width:8px;height:8px;border-radius:50%;background:var(--color-pass);flex-shrink:0;" title="Watching for changes"></span>
          <button class="theme-toggle" id="btn-theme" title="Toggle theme">
            <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          </button>
        </div>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-primary" style="flex:1;" id="btn-pick-dir">Open Dir</button>
          <button class="btn" style="flex:1;" id="btn-pick-file">Open File</button>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;">
          <span style="font-size:10px;color:var(--color-text-muted);" id="app-version">v0.1.0</span>
          <button class="btn btn-sm btn-ghost" id="btn-check-update" style="font-size:10px;">Check Update</button>
        </div>
      </div>
    </aside>

    <!-- Content -->
    <main class="content-area">
      <div id="page-validate" class="page active"></div>
      <div id="page-matcher" class="page"></div>
      <div id="page-coverage" class="page"></div>
      <div id="page-llm" class="page"></div>
    </main>
  </div>

  <script src="js/vendor/marked.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/validate.js"></script>
  <script src="js/matcher.js"></script>
  <script src="js/coverage.js"></script>
  <script src="js/llm.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
